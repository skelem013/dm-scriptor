<!DOCTYPE html>
<html>
<head>
    <title>DM Scriptor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #0f0f0f;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
        }

        button {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

        .signal {
            background: #1f1f1f;
            color: white;
        }

        .output {
            margin-top: 20px;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
        }

        .copy {
            background: white;
            color: black;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>DM Scriptor</h2>

    {% for signal, script in scripts.items() %}
        <button class="signal" onclick="showScript(`{{ script }}`)">
            {{ signal }}
        </button>
    {% endfor %}

    <div class="output" id="output" style="display:none;">
        <h3>Warm Open</h3>
        <p id="text"></p>
        <button class="copy" onclick="copyText()">Copy</button>
    </div>

</div>

<script>
let current = "";

function showScript(text) {
    current = text;
    document.getElementById("text").innerText = text;
    document.getElementById("output").style.display = "block";
}

function copyText() {
    navigator.clipboard.writeText(current);
    alert("Copied");
}
</script>

</body>
</html>
