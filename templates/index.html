<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM Scriptor - From Attention to Income</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #999;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .signals-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 30px;
        }

        .signal-btn {
            width: 100%;
            padding: 18px;
            border: 2px solid #2a2a2a;
            background: linear-gradient(135deg, #1f1f1f 0%, #252525 100%);
            color: white;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .signal-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .signal-btn:hover {
            border-color: #ff6b6b;
            background: linear-gradient(135deg, #2a2a2a 0%, #333 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 107, 107, 0.2);
        }

        .signal-btn:hover::before {
            left: 100%;
        }

        .output-section {
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        .output-section.active {
            display: block;
        }

        .output-card {
            background: linear-gradient(135deg, #1f1f1f 0%, #252525 100%);
            border: 2px solid #2a2a2a;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .output-card h3 {
            font-size: 14px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .output-card p {
            font-size: 16px;
            line-height: 1.6;
            color: #e0e0e0;
            margin-bottom: 16px;
        }

        .copy-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b6b, #ff8c42);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 107, 107, 0.3);
        }

        .copy-btn:active {
            transform: translateY(0);
        }

        .copy-feedback {
            display: none;
            text-align: center;
            color: #4ade80;
            font-size: 14px;
            margin-top: 12px;
            animation: fadeIn 0.3s ease;
        }

        .copy-feedback.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 24px;
            }

            .signal-btn {
                padding: 16px;
                font-size: 14px;
            }

            .output-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 DM Scriptor</h1>
            <p>From Attention to Income</p>
        </div>

        <div class="signals-grid" id="signalsGrid">
            {% for signal, script in scripts.items() %}
                <button class="signal-btn" onclick="showScript('{{ signal|tojson|safe }}', '{{ script|tojson|safe }}')">
                    {{ signal }}
                </button>
            {% endfor %}
        </div>

        <div class="output-section" id="outputSection">
            <div class="output-card">
                <h3>📝 Warm Open Response</h3>
                <p id="scriptText"></p>
                <button class="copy-btn" onclick="copyText()">📋 Copy to Clipboard</button>
                <div class="copy-feedback" id="copyFeedback">✓ Copied!</div>
            </div>
        </div>
    </div>

    <script>
        let currentScript = "";

        function showScript(signal, script) {
            currentScript = script;
            document.getElementById('scriptText').textContent = script;
            document.getElementById('outputSection').classList.add('active');
            document.getElementById('copyFeedback').classList.remove('show');
        }

        function copyText() {
            navigator.clipboard.writeText(currentScript).then(() => {
                const feedback = document.getElementById('copyFeedback');
                feedback.classList.add('show');
                setTimeout(() => {
                    feedback.classList.remove('show');
                }, 2000);
            }).catch(err => {
                alert('Failed to copy: ' + err);
            });
        }
    </script>
</body>
</html>
